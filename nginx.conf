worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  # Security headers included in every response (reusable via include)
  # NOTE: nginx add_header in a location block replaces ALL parent add_header directives,
  # so every location with its own add_header must also include these.
  map $sent_http_content_type $security_headers {
    default "";
  }

  server {
    # Security headers (server-level default)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Explicit favicon handling to avoid stale caches
    location = /favicon.ico {
      add_header Cache-Control "public, max-age=86400";
      add_header X-Content-Type-Options "nosniff" always;
      return 302 https://assets.appraisily.com/assets/directory/WebPage/logo_new.png;
    }

    location = /favicon.svg {
      add_header Cache-Control "public, max-age=86400";
      add_header X-Content-Type-Options "nosniff" always;
      return 302 https://assets.appraisily.com/assets/directory/WebPage/logo_new.png;
    }

    # PWA / Android icon redirect to valid asset
    location = /android-chrome-192x192.png {
      add_header Cache-Control "public, max-age=86400";
      add_header X-Content-Type-Options "nosniff" always;
      return 302 https://assets.appraisily.com/assets/directory/WebPage/logo_new.png;
    }

    # Apple touch icon redirect
    location = /apple-touch-icon.png {
      add_header Cache-Control "public, max-age=86400";
      add_header X-Content-Type-Options "nosniff" always;
      return 302 https://assets.appraisily.com/assets/directory/WebPage/logo_new.png;
    }

    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;

    index index.html;

    # Custom 404: serve the SPA so React Router can handle unknown routes
    error_page 404 /index.html;

    # Serve robots.txt and sitemap.xml as static files -- MUST precede SPA catch-all
    location = /robots.txt {
      try_files $uri =404;
      add_header Content-Type "text/plain" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
      access_log off;
    }

    location = /sitemap.xml {
      try_files $uri =404;
      add_header Content-Type "application/xml" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
      access_log off;
    }

    location = /health {
      default_type application/json;
      return 200 '{"status":"ok"}';
    }

    # Serve built assets directly; never rewrite to index.html
    location ^~ /assets/ {
      # If file doesn't exist, return 404 (do not fall back to index.html)
      try_files $uri =404;
      # Aggressive caching for hashed assets
      expires 1y;
      add_header Cache-Control "public, immutable, max-age=31536000" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      access_log off;
    }

    # Serve common static files directly
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|otf)$ {
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      access_log off;
    }

    # Do not cache HTML documents to avoid stale index.html pointing to old chunk names
    location ~* \.html$ {
      try_files $uri /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Cloudflare-CDN-Cache-Control "no-store" always;
      add_header cf-edge-cache "no-cache" always;
      add_header Pragma "no-cache" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      expires -1;
    }

    # SPA fallback for application routes
    location / {
      try_files $uri $uri/index.html /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Cloudflare-CDN-Cache-Control "no-store" always;
      add_header cf-edge-cache "no-cache" always;
      add_header Pragma "no-cache" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      expires -1;
    }

    # Canonicalize trailing slashes for SEO.
    # Keep this as a relative redirect so we don't leak internal schemes/hosts.
    location ~ ^/(location|appraiser)/([^/]+)$ {
      return 301 /$1/$2/$is_args$args;
    }

    # Redirect WordPress content to resources subdomain
    location ^~ /wp-content/ {
      return 301 https://resources.appraisily.com$request_uri;
    }

    # Redirect WordPress admin to resources subdomain
    location ^~ /wp-admin/ {
      return 301 https://resources.appraisily.com$request_uri;
    }

    # Canonicalize singular to plural: /appraisal/<id> → https://appraisily.com/appraisals/<id>
    # Always emit the public HTTPS host to avoid leaking internal ports or schemes.
    location ~ ^/appraisal/([A-Za-z0-9-]+)/?$ {
      return 301 https://appraisily.com/appraisals/$1$is_args$args;
    }

    gzip on;
    gzip_types text/plain application/xml text/css text/javascript application/javascript application/json;
  }
}
